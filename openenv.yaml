env_id: StockTradingEnv-v1
version: "1.0.0"
description: >
  A real-world stock trading simulation where an AI agent learns to
  buy, sell, or hold a stock to maximise portfolio value over 200 steps.

author: OpenEnv Round 1 Submission
license: MIT

# ── API ───────────────────────────────────────────────────────────────────────
api:
  reset:
    endpoint: POST /reset
    input: { seed: int }
    output: { session_id: str, state: StockState }

  step:
    endpoint: POST /step
    input: { session_id: str, action: int, quantity: float }
    output: { state: StockState, reward: float, done: bool, info: dict }

  state:
    endpoint: GET /state/{session_id}
    output: StockState

# ── Action Space ──────────────────────────────────────────────────────────────
action_space:
  type: hybrid
  discrete:
    name: action
    values: { 0: HOLD, 1: BUY, 2: SELL }
  continuous:
    name: quantity
    range: [0.0, 1.0]
    description: Fraction of max_shares to trade

# ── Observation Space ─────────────────────────────────────────────────────────
observation_space:
  step:            { type: int,   description: Current timestep }
  price:           { type: float, description: Current stock price }
  price_history:   { type: list,  description: Last 10 prices }
  cash:            { type: float, description: Available cash }
  shares_held:     { type: int,   description: Shares currently owned }
  portfolio_value: { type: float, description: shares_held × price }
  net_worth:       { type: float, description: cash + portfolio_value }
  done:            { type: bool,  description: Episode finished flag }
  reward:          { type: float, description: Last step reward }

# ── Episode ───────────────────────────────────────────────────────────────────
episode:
  max_steps: 200
  initial_capital: 10000.0
  max_shares: 50
  transaction_fee: 0.001
  termination:
    - max_steps_reached
    - bankrupt (net_worth <= 0)

# ── Reward ────────────────────────────────────────────────────────────────────
reward:
  formula: "(net_worth_t - net_worth_{t-1}) / initial_capital"
  range: [-1.0, +inf]
  partial_progress: true
  description: >
    Dense reward signal at every step based on change in net worth,
    normalised by initial capital.

# ── Graders ───────────────────────────────────────────────────────────────────
graders:
  - name: easy
    score_range: [0.0, 1.0]
    task: Survive the episode without going bankrupt
    strategy: buy_and_hold
    passing_threshold: 0.5

  - name: medium
    score_range: [0.0, 1.0]
    task: Achieve positive profit (> 0% return)
    strategy: moving_average_crossover
    passing_threshold: 0.6

  - name: hard
    score_range: [0.0, 1.0]
    task: Outperform buy-and-hold by at least 5%
    strategy: momentum_rsi
    passing_threshold: 0.75

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  platform: huggingface_spaces
  sdk: docker
  port: 7860
  health_check: GET /
